name: Engine release

# Публикует "чистый" exe движка — только код + встроенный по-настоящему пустой
# appsettings.default.json (см. docs/ARCHITECTURE.md, "Модель движок/модпак"). Отдельная
# нумерация тегов (engine-vX.Y.Z), не пересекается с версиями релизов конкретного модпака
# (те публикуются из Admin-режима через PublishPipeline, из отдельного репозитория модпака,
# не через этот workflow).
#
# Сознательно НЕ прикладывает appsettings.json к релизу отдельным ассетом — только exe.
# appsettings.json в этом репозитории и так пустой (движок ни к какому модпаку не привязан),
# но раз в исходниках лежит "рабочая копия для локальной разработки", а не гарантированно
# пустой файл, безопаснее не тащить её в публичный релиз вообще: единственное, что реально
# получает пользователь — сам exe с truly-empty embedded-фоллбеком.

on:
  push:
    tags:
      - "engine-v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # EngineSelfUpdater (см. src/VanillaLauncher.Client/EngineSelfUpdater.cs) сравнивает
      # версию из тега engine-vX.Y.Z с константой EngineVersion.Current, зашитой в exe.
      # Если их забыли обновить синхронно, самообновление либо никогда не найдёт "новую"
      # версию (константа не бампнута), либо наоборот. Проваливаем публикацию заранее,
      # а не выясняем это постфактум у живых пользователей.
      - name: Verify EngineVersion.Current matches tag
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^engine-v', ''
          $match = Select-String -Path 'src/VanillaLauncher.Client/EngineVersion.cs' -Pattern 'Current = "(.*?)"'
          if (-not $match) {
            Write-Error "Не удалось найти EngineVersion.Current в src/VanillaLauncher.Client/EngineVersion.cs"
            exit 1
          }
          $codeVersion = $match.Matches[0].Groups[1].Value
          if ($tagVersion -ne $codeVersion) {
            Write-Error "Версия в теге ($tagVersion) не совпадает с EngineVersion.Current в коде ($codeVersion). Обнови константу перед тегом."
            exit 1
          }
          Write-Host "OK: тег и EngineVersion.Current совпадают ($codeVersion)"

      - name: dotnet publish (self-contained win-x64 single file)
        run: >
          dotnet publish src/VanillaLauncher.Client.UI/VanillaLauncher.Client.UI.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -o publish

      - name: Upload exe to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "publish/VanillaLauncher.exe" `
            --title "${{ github.ref_name }}" `
            --generate-notes
